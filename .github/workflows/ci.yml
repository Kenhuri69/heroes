name: CI

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm typecheck
      - run: pnpm lint
      - run: pnpm test          # --if-present : les tests moteur arrivent en Phase 2.1
      - run: pnpm build

      # Smoke headless sur le build de prod (guideline §7)
      - run: pnpm exec playwright install chromium --with-deps
      - run: pnpm smoke
