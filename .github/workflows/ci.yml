name: CI

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  # Qualité statique + moteur + build + gardes-fous — tourne une seule fois.
  # Le smoke Playwright (le plus long) est déporté dans des jobs dédiés
  # parallèles ci-dessous (voir .claude/plans/test-performance-optimization.md).
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm typecheck
      - run: pnpm lint
      - run: pnpm test          # moteur + contenu : unitaires, property-based, golden replay
      - run: pnpm content:check # validation de tous les paquets de faction (doc 06)

      # Invariant « le moteur ne connaît aucune faction » (README §1) :
      # les IDs de faction ne doivent apparaître que dans data/ (et les tests).
      # Le motif est dérivé de data/factions/index.json (source de vérité) pour
      # rester exhaustif quand une faction est ajoutée. On distingue explicitement
      # les 3 statuts de grep : 0 = un ID trouvé (échec), 1 = aucun (succès),
      # >1 = erreur d'exécution (échec) — sans quoi un grep cassé passerait pour vert.
      - name: Vérifier l'absence d'IDs de faction dans packages/
        run: |
          pattern=$(jq -r '.factions | map("\\b" + . + "\\b") | join("|")' data/factions/index.json)
          echo "motif faction : ${pattern}"
          set +e
          hits=$(grep -rInE "$pattern" packages/ \
            --include='*.ts' --include='*.tsx' --include='*.js' \
            --include='*.cjs' --include='*.mjs' --include='*.json' \
            --exclude-dir=dist --exclude-dir=node_modules)
          status=$?
          set -e
          if [ "$status" -eq 0 ]; then
            echo "::error::ID(s) de faction trouvé(s) dans packages/ :"
            echo "$hits"
            exit 1
          elif [ "$status" -ne 1 ]; then
            echo "::error::échec de l'exécution de grep (statut ${status})"
            exit 1
          fi
          echo "aucun ID de faction dans packages/ ✓"

      # Invariant design system (UXD-1, plan ux-design-overhaul §3) : les
      # couleurs de l'UI DOM vivent dans ui/tokens.css UNIQUEMENT — aucun
      # littéral #hex / rgb()/rgba() dans les autres feuilles (toujours
      # var(--…)). Même triptyque de statuts grep que le garde-fou faction.
      - name: Vérifier l'absence de couleurs en dur hors tokens.css
        run: |
          set +e
          hits=$(grep -rInE '#[0-9a-fA-F]{3,8}\b|rgba?\(' packages/client/src/ui \
            --include='*.css' --exclude='tokens.css')
          status=$?
          set -e
          if [ "$status" -eq 0 ]; then
            echo "::error::couleur(s) en dur hors ui/tokens.css :"
            echo "$hits"
            exit 1
          elif [ "$status" -ne 1 ]; then
            echo "::error::échec de l'exécution de grep (statut ${status})"
            exit 1
          fi
          echo "aucune couleur en dur hors tokens.css ✓"

      - run: pnpm build

      # Budget perf (doc 07 §6) : bundle initial JS+CSS < 800 Ko gzip.
      - name: Budget bundle < 800 Ko gzip
        run: |
          total=$(find packages/client/dist/assets \( -name '*.js' -o -name '*.css' \) -exec sh -c 'gzip -c "$1" | wc -c' _ {} \; | awk '{s+=$1} END {print s}')
          echo "bundle gzip: ${total} octets"
          [ "$total" -le 819200 ]

  # Smoke headless sur le build de prod (guideline §7), shardé en 2 lots
  # parallèles + fully-parallel intra-lot (playwright.config.ts). Les tests de
  # throttling FPS (@perf) sont exclus ici — ils mesurent des FPS sous rendu
  # logiciel et deviendraient flaky en concurrence CPU ; ils tournent isolés
  # dans le job `smoke-perf`.
  smoke:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2]
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile

      - name: Cache des navigateurs Playwright
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
      - run: pnpm exec playwright install chromium --with-deps

      - run: pnpm build

      - run: pnpm smoke -- --shard=${{ matrix.shard }}/2 --grep-invert=@perf

  # Tests de fluidité (@perf) isolés : mono-worker, seuls sur le runner, pour
  # une mesure FPS non perturbée par la charge parallèle.
  smoke-perf:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile

      - name: Cache des navigateurs Playwright
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
      - run: pnpm exec playwright install chromium --with-deps

      - run: pnpm build

      - run: pnpm smoke -- --project=desktop --grep=@perf --workers=1
