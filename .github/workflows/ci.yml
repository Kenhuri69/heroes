name: CI

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm typecheck
      - run: pnpm lint
      - run: pnpm test          # moteur + contenu : unitaires, property-based, golden replay
      - run: pnpm content:check # validation de tous les paquets de faction (doc 06)

      # Invariant « le moteur ne connaît aucune faction » (README §1) :
      # les IDs de faction ne doivent apparaître que dans data/ (et les tests).
      # Le motif est dérivé de data/factions/index.json (source de vérité) pour
      # rester exhaustif quand une faction est ajoutée. On distingue explicitement
      # les 3 statuts de grep : 0 = un ID trouvé (échec), 1 = aucun (succès),
      # >1 = erreur d'exécution (échec) — sans quoi un grep cassé passerait pour vert.
      - name: Vérifier l'absence d'IDs de faction dans packages/
        run: |
          pattern=$(jq -r '.factions | map("\\b" + . + "\\b") | join("|")' data/factions/index.json)
          echo "motif faction : ${pattern}"
          set +e
          hits=$(grep -rInE "$pattern" packages/ \
            --include='*.ts' --include='*.tsx' --include='*.js' \
            --include='*.cjs' --include='*.mjs' --include='*.json' \
            --exclude-dir=dist --exclude-dir=node_modules)
          status=$?
          set -e
          if [ "$status" -eq 0 ]; then
            echo "::error::ID(s) de faction trouvé(s) dans packages/ :"
            echo "$hits"
            exit 1
          elif [ "$status" -ne 1 ]; then
            echo "::error::échec de l'exécution de grep (statut ${status})"
            exit 1
          fi
          echo "aucun ID de faction dans packages/ ✓"

      - run: pnpm build

      # Budget perf (doc 07 §6) : bundle initial JS+CSS < 800 Ko gzip.
      - name: Budget bundle < 800 Ko gzip
        run: |
          total=$(find packages/client/dist/assets \( -name '*.js' -o -name '*.css' \) -exec sh -c 'gzip -c "$1" | wc -c' _ {} \; | awk '{s+=$1} END {print s}')
          echo "bundle gzip: ${total} octets"
          [ "$total" -le 819200 ]

      # Smoke headless sur le build de prod (guideline §7)
      - run: pnpm exec playwright install chromium --with-deps
      - run: pnpm smoke
