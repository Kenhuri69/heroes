# Déploiement GitHub Pages — version BOOTSTRAP.
# Publie la page d'attente statique `site/` pour valider la chaîne Pages de bout en bout.
# En Phase 2.0, ce job `build` sera remplacé par le build pnpm/Vite du client
# (version cible : docs/10-plan-phase-2-implementation.md §4.2).

name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/configure-pages@v5
        with:
          enablement: true   # active Pages (source: GitHub Actions) si pas déjà fait

      - uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
