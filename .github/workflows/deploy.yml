# Déploiement GitHub Pages — build Vite du client (doc 10 §4.2).
# Qualité + smoke headless sur le build de prod avant toute publication :
# on ne déploie jamais un build rouge.

name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm typecheck
      - run: pnpm lint
      - run: pnpm test          # moteur + contenu : unitaires, property-based, golden replay
      - run: pnpm content:check # validation de tous les paquets de faction (doc 06)

      - run: pnpm build

      # Budget perf (doc 07 §6) : bundle initial JS+CSS < 800 Ko gzip.
      - name: Budget bundle < 800 Ko gzip
        run: |
          total=$(find packages/client/dist/assets \( -name '*.js' -o -name '*.css' \) -exec sh -c 'gzip -c "$1" | wc -c' _ {} \; | awk '{s+=$1} END {print s}')
          echo "bundle gzip: ${total} octets"
          [ "$total" -le 819200 ]

      # Smoke headless sur le build de prod (guideline §7) — build HORS-LIGNE
      # (pas de VITE_BACKEND_URL) : le smoke reste déterministe et ne touche
      # jamais le réseau (bouton « En ligne » masqué, test 7.3).
      # Fully-parallel via playwright.config.ts ; les tests @perf (FPS) sont
      # isolés en mono-worker après coup pour ne pas fausser la mesure sous
      # charge (cf. .claude/plans/test-performance-optimization.md).
      - name: Cache des navigateurs Playwright
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
      - run: pnpm exec playwright install chromium --with-deps
      # Appel direct de Playwright (le script `pnpm smoke` ne transmet pas les
      # arguments après `--`).
      # `@e2e` exclu ici aussi : le harnais end-to-end est OPTIONNEL (job dédié
      # non bloquant sur PR, ci.yml) — il ne doit pas gater un déploiement.
      - run: pnpm exec playwright test --grep-invert='@perf|@e2e'
      - run: pnpm exec playwright test --project=desktop --grep=@perf --workers=1

      # Backend (Live 7.4) : REBUILD du client avec l'URL du Worker AVANT publication
      # — seul l'artefact déployé embarque le backend (le smoke ci-dessus reste
      # hors-ligne). Variable de dépôt absente ⇒ chaîne vide ⇒ client hors-ligne.
      - name: Rebuild client with backend URL
        run: pnpm build
        env:
          VITE_BACKEND_URL: ${{ vars.VITE_BACKEND_URL }}

      - uses: actions/configure-pages@v5
        with:
          enablement: true   # no-op une fois Pages activé

      - uses: actions/upload-pages-artifact@v3
        with:
          path: packages/client/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
