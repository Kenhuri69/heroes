<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
  <title>Heroes</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'><text y='13' font-size='13'>⚔️</text></svg>">
  <!-- PWA (lot 8.1) : installable + hors-ligne. Chemins relatifs ⇒ résolus sous /heroes/. -->
  <link rel="manifest" href="manifest.webmanifest">
  <meta name="theme-color" content="#1a1c22">
  <link rel="apple-touch-icon" href="icons/apple-touch-icon-180.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Heroes">
  <style>
    html, body { margin: 0; height: 100%; overflow: hidden; background: #1a1c22; }
    /* touch-action none : pan/pinch gérés par la caméra, pas par le navigateur */
    #canvas-root { position: fixed; inset: 0; touch-action: none; }
    #ui-root { position: fixed; inset: 0; pointer-events: none; }
    /* Boot loader (retour de jeu) : peint INSTANTANÉMENT — HTML + CSS inline, avant
       même le bundle JS — pour couvrir tout le bootstrap (fetch du contenu +
       téléchargement des textures), sinon l'écran reste noir et muet. Retiré par
       main.ts au `__HEROES_READY__`. Couleurs d'identité (or sur ardoise). */
    #boot-loader {
      position: fixed; inset: 0; z-index: 100;
      display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 1.4rem;
      color: #e8e8ea; font-family: system-ui, -apple-system, sans-serif;
      /* Vignette d'ambiance (profondeur) : clair au centre, sombre aux bords. */
      background: radial-gradient(circle at 50% 42%, #262935 0%, #1a1c22 55%, #131419 100%);
      transition: opacity .45s ease;
    }
    #boot-loader.boot-hidden { opacity: 0; pointer-events: none; }
    /* Emblème (crest) : SVG inline ⇒ peint instantanément, aucun téléchargement.
       Halo doré qui respire + arc qui tourne = affordance « ça charge ». */
    #boot-loader .bl-emblem {
      position: relative; width: 150px; height: 168px;
      display: flex; align-items: center; justify-content: center;
      filter: drop-shadow(0 0 16px rgba(242, 193, 78, .35));
      animation: bl-glow 2.4s ease-in-out infinite;
    }
    #boot-loader .bl-emblem svg { width: 112px; height: auto; }
    #boot-loader .bl-emblem::after {
      content: ""; position: absolute; top: 50%; left: 50%;
      width: 156px; height: 156px; margin: -78px 0 0 -78px; border-radius: 50%;
      border: 3px solid transparent; border-top-color: rgba(242, 193, 78, .85);
      animation: bl-spin 1.1s linear infinite;
    }
    #boot-loader .bl-title {
      font-family: Georgia, 'Times New Roman', serif; font-size: 1.9rem;
      letter-spacing: .24em; text-transform: uppercase; color: #f2c14e;
      text-shadow: 0 1px 3px rgba(0, 0, 0, .55); margin: 0;
    }
    #boot-loader .bl-bar { width: min(260px, 60vw); height: 6px; border-radius: 3px; background: rgba(255, 255, 255, .1); overflow: hidden; }
    #boot-loader .bl-fill { height: 100%; width: 8%; background: linear-gradient(90deg, #c9962f, #f2c14e); transition: width .3s ease; box-shadow: 0 0 8px rgba(242, 193, 78, .5); }
    #boot-loader .bl-status { font-size: .95rem; color: #b8b8be; min-height: 1.2em; letter-spacing: .02em; }
    @keyframes bl-spin { to { transform: rotate(360deg); } }
    @keyframes bl-glow { 0%, 100% { filter: drop-shadow(0 0 12px rgba(242, 193, 78, .28)); } 50% { filter: drop-shadow(0 0 22px rgba(242, 193, 78, .5)); } }
    @media (prefers-reduced-motion: reduce) {
      #boot-loader .bl-emblem { animation: none; }
      #boot-loader .bl-emblem::after { animation: none; border-top-color: rgba(242, 193, 78, .5); }
    }
  </style>
</head>
<body>
  <div id="canvas-root"></div>
  <div id="ui-root"></div>
  <!-- Écran de chargement initial (retiré dès que le jeu est prêt). -->
  <div id="boot-loader" role="status" aria-live="polite">
    <div class="bl-emblem">
      <svg viewBox="0 0 120 148" role="img" aria-label="Heroes">
        <defs>
          <linearGradient id="bl-gold" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0" stop-color="#f7dc93"/><stop offset=".5" stop-color="#e6b84e"/><stop offset="1" stop-color="#a9772a"/>
          </linearGradient>
          <radialGradient id="bl-shield" cx=".5" cy=".34" r=".85">
            <stop offset="0" stop-color="#2b2e3a"/><stop offset="1" stop-color="#15171e"/>
          </radialGradient>
          <g id="bl-sword">
            <polygon points="0,-42 3.5,-34 3.5,14 -3.5,14 -3.5,-34" fill="url(#bl-gold)" stroke="#6b4a1e" stroke-width=".6"/>
            <line x1="0" y1="-32" x2="0" y2="12" stroke="rgba(0,0,0,.22)" stroke-width="1"/>
            <rect x="-12" y="13" width="24" height="4.5" rx="1.5" fill="#caa24a" stroke="#6b4a1e" stroke-width=".5"/>
            <rect x="-2.4" y="17.5" width="4.8" height="12" fill="#7a5327"/>
            <circle cx="0" cy="30" r="4" fill="url(#bl-gold)" stroke="#6b4a1e" stroke-width=".6"/>
          </g>
        </defs>
        <path d="M18 16 H102 V64 C102 98 74 120 60 130 C46 120 18 98 18 64 Z"
              fill="url(#bl-shield)" stroke="url(#bl-gold)" stroke-width="3" stroke-linejoin="round"/>
        <path d="M25 22 H95 V64 C95 92 71 112 60 121 C49 112 25 92 25 64 Z"
              fill="none" stroke="rgba(242,193,78,.28)" stroke-width="1.4"/>
        <use href="#bl-sword" transform="translate(60 64) rotate(34)"/>
        <use href="#bl-sword" transform="translate(60 64) rotate(-34)"/>
        <polygon points="60,20 64,27 60,34 56,27" fill="url(#bl-gold)" stroke="#6b4a1e" stroke-width=".6"/>
      </svg>
    </div>
    <p class="bl-title">Heroes</p>
    <div class="bl-bar"><div class="bl-fill" id="boot-loader-fill"></div></div>
    <div class="bl-status" id="boot-loader-status">Chargement…</div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
